<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Challenges Pharmacie">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#065f46"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Piste de la jauge -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="34"/>

  <!-- Arc de progression (~78 %), du sommet vers 2 h en passant par la gauche -->
  <path d="M 256 88 A 168 168 0 1 0 421 225" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round"/>

  <!-- Croix de pharmacie -->
  <g fill="#ffffff">
    <rect x="212" y="156" width="88" height="200" rx="26"/>
    <rect x="156" y="212" width="200" height="88" rx="26"/>
  </g>

  <!-- Point d'étape à l'extrémité de la jauge -->
  <circle cx="421" cy="225" r="27" fill="#ffffff"/>
  <path d="M409 225l9 9 16 -17" fill="none" stroke="#047857" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
